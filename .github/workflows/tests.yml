name: tests

on:
  push:
    branches: [main]
  pull_request:

env:
  NVIM_VERSION: v0.12.2

jobs:
  plenary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        run: |
          curl -fsSL "https://github.com/neovim/neovim/releases/download/${NVIM_VERSION}/nvim-linux-x86_64.tar.gz" -o nvim.tar.gz
          tar -xzf nvim.tar.gz
          echo "$PWD/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"
          "$PWD/nvim-linux-x86_64/bin/nvim" --version | head -n 1

      - name: Install plenary.nvim
        run: |
          mkdir -p "$HOME/.local/share/nvim/lazy"
          git clone --depth=1 https://github.com/nvim-lua/plenary.nvim "$HOME/.local/share/nvim/lazy/plenary.nvim"

      - name: Run tests
        run: |
          REPO_ROOT="$(pwd)"
          nvim --headless -u "$REPO_ROOT/tests/minimal_init.lua" \
            -c "PlenaryBustedDirectory $REPO_ROOT/tests { minimal_init = '$REPO_ROOT/tests/minimal_init.lua' }"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        run: |
          curl -fsSL "https://github.com/neovim/neovim/releases/download/${NVIM_VERSION}/nvim-linux-x86_64.tar.gz" -o nvim.tar.gz
          tar -xzf nvim.tar.gz
          echo "$PWD/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"
          "$PWD/nvim-linux-x86_64/bin/nvim" --version | head -n 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run test:e2e -- --project=chromium
